services:
  postgres:
    image: postgres:16-alpine
    container_name: pet-dashboard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pet_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pet_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
